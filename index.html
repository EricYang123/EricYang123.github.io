<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Map</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div id="map-container">
        <img
            id="map-img"
            src="fast_and_frequent_transit_map-1.png"
            alt="Map"
        />

	<div id="team-dashboard">
            <div class="team-panel red-panel">
                <div class="dash-row"><span>Stations:</span> <strong id="red-controlled">0</strong></div>
                <div class="dash-row"><span>Coins:</span> <input type="number" id="red-pool" value="100" /></div>
            </div>
            <div class="team-panel blue-panel">
		<div class="dash-row"><span>Stations:</span> <strong id="blue-controlled">0</strong></div>
                <div class="dash-row"><span>Coins:</span> <input type="number" id="blue-pool" value="100" /></div>
            </div>
        </div>
    </div>

    <script src="map.js"></script>

</body>
</html>
